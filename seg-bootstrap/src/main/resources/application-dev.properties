#=====================================================================
# Esta configuracion se carga cuando spring.profiles.active=dev
#=====================================================================
# DATABASE CONFIGURATION (PostgreSQL)
#=====================================================================
#spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.127.121:5432/sicoes}
#spring.datasource.username=${DB_USERNAME:postgres}
#spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

#=====================================================================
# JPA / HIBERNATE - DEBUG MODE
#=====================================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.hibernate.ddl-auto=none

#=====================================================================
# LOGGING - DEVELOPMENT
#=====================================================================
logging.level.root=INFO
logging.level.bo.sigep=DEBUG
logging.level.bo.sicoes=DEBUG
logging.level.org.mefp.=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#=====================================================================
# OPENAPI / SWAGGER - ENABLED
#=====================================================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.try-it-out-enabled=true

#=====================================================================
# MANAGEMENT / ACTUATOR - DEVELOPMENT
#=====================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

server.port=1616

# CORS
app.cors.allowed-origins=http://localhost:7171,http://localhost:8080
spring.application.name=app


# Configuracion personalizada del greeter
greeter.message=Hola
greeter.name=Hernan
greeter.enabled=true
