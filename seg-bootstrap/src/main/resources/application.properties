#=====================================================================
# Base profile configuration (override with application-{profile}.properties)
spring.application.name=sigep-seg-api
spring.profiles.active=${SPRING_PROFILE:dev}

#=====================================================================
# DATABASE CONFIGURATION (PostgreSQL)
#=====================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.127.121:5432/sicoes}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (Hikari) - Production-ready settings
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

#=====================================================================
# JPA / HIBERNATE CONFIGURATION
#=====================================================================
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

#=====================================================================
# SERVER CONFIGURATION
#=====================================================================
server.port=${SERVER_PORT:7171}
server.servlet.context-path=${CONTEXT_PATH:/api}

#=====================================================================
# OPENAPI / SWAGGER
#=====================================================================
# URLs de acceso a Swagger (sin context-path)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.try-it-out-enabled=true


