#=====================================================================
# Esta configuracion se carga cuando spring.profiles.active=prod
#=====================================================================
# DATABASE - PRODUCCION
#=====================================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection Pool - Optimized for production
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#=====================================================================
# JPA / HIBERNATE - PERFORMANCE
#=====================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

#=====================================================================
# LOGGING - PRODUCTION
#=====================================================================
logging.level.root=WARN
logging.level.bo.sigep=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

#=====================================================================
# OPENAPI / SWAGGER - DISABLED
#=====================================================================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

#=====================================================================
# SECURITY & PERFORMANCE
#=====================================================================
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

#=====================================================================
# MANAGEMENT / ACTUATOR - LIMITED
#=====================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

