server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: springboot-logs
    pipeline_stages:
      - json:
          expressions:
            log: log

      - json:
          source: log
          expressions:
            traceId: contextMap.traceId
            level: level

      - labels:
          traceId:
          level:
    static_configs:
      - targets:
          - localhost
        labels:
          job: springboot
          __path__: /var/lib/docker/containers/*/*.log